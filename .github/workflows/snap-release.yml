name: Snap Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-snap:
    name: Build Snap (${{ matrix.architecture }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        architecture: [amd64, arm64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up QEMU for multi-arch builds
        if: matrix.architecture == 'arm64'
        uses: docker/setup-qemu-action@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js & Python
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Components Nativity
        run: |
          if [ "${{ matrix.architecture }}" = "amd64" ]; then
            sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev
            ./scripts/build_linux_x64.sh
          else
            bash scripts/setup_linux_arm64_deps.sh
            ./scripts/build_linux_arm64.sh
          fi

      - name: Build Snap
        uses: snapcore/action-build@v1
        id: snapcraft
        with:
          path: .
          # For arm64 on amd64 runners, snapcraft uses LXD/Multipass which might be tricky in CI
          # But action-build handles the environment setup.
        
      - name: Upload Snap Artifact
        uses: actions/upload-artifact@v7
        with:
          name: snap-${{ matrix.architecture }}
          path: ${{ steps.snapcraft.outputs.snap }}

  publish-snap:
    name: Publish Snap to Store
    needs: build-snap
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all snaps
        uses: actions/download-artifact@v4
        with:
          path: snaps
          merge-multiple: true

      - name: Publish to Snap Store
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: snaps/*.snap
          release: stable
