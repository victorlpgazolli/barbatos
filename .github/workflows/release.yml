name: Unified Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build-linux-x64:
        type: boolean
        description: 'Build Linux x86_64'
        default: true
      build-linux-arm64:
        type: boolean
        description: 'Build Linux ARM64'
        default: true
      build-macos-arm64:
        type: boolean
        description: 'Build macOS ARM64'
        default: true
      publish-github:
        type: boolean
        description: 'Publish to GitHub Release'
        default: true
      publish-apt:
        type: boolean
        description: 'Publish to APT Repository'
        default: true
      publish-snapcraft:
        type: boolean
        description: 'Publish to Snapcraft Store'
        default: true

jobs:
  setup-release:
    name: Setup Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    outputs:
      release_tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Update version.txt
        if: github.event_name != 'workflow_dispatch'
        env:
          COMMIT_MESSAGE: "chore: update version.txt with release ${{ github.ref_name }}"
          VERSION: ${{ github.ref_name }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          echo "${VERSION}" > version.txt
          git add ./version.txt
          git diff --cached --quiet || git commit -m "$COMMIT_MESSAGE"
          git push origin HEAD:master

      - name: Create GitHub Release
        if: github.event_name != 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${RELEASE_TAG} \
            --title "Release ${RELEASE_TAG}" \
            --generate-notes

      - name: Export release tag
        id: release
        shell: bash
        run: echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Export version
        id: version
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="0.0.0-snapshot"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build-linux-x64:
    name: Build Linux x64
    runs-on: ubuntu-24.04
    needs: setup-release
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.build-linux-x64 == true) ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build Linux x86_64
        uses: ./.github/actions/build-linux
        with:
          architecture: x86_64

  build-linux-arm64:
    name: Build Linux ARM64
    runs-on: ubuntu-24.04
    needs: setup-release
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.build-linux-arm64 == true) ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build Linux aarch64
        uses: ./.github/actions/build-linux
        with:
          architecture: aarch64

  build-macos-arm64:
    name: Build macOS ARM64
    runs-on: macos-15
    needs: setup-release
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.build-macos-arm64 == true) ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build macOS ARM64
        uses: ./.github/actions/build-macos

  publish-github:
    name: Publish to GitHub Release
    runs-on: ubuntu-latest
    needs: [setup-release, build-linux-x64, build-linux-arm64, build-macos-arm64]
    if: |
      !failure() &&
      (github.event_name == 'workflow_dispatch' && inputs.publish-github == true) ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish to GitHub Release
        uses: ./.github/actions/publish-to-platform
        with:
          platform: github
          artifacts-dir: artifacts

  publish-apt:
    name: Publish to APT Repository
    runs-on: ubuntu-latest
    needs: [setup-release, build-linux-x64, build-linux-arm64]
    if: |
      !failure() &&
      startsWith(github.ref, 'refs/tags/v') &&
      ((github.event_name == 'workflow_dispatch' && inputs.publish-apt == true) ||
       (github.event_name == 'push'))
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Assemble Debian Packages
        env:
          VERSION: ${{ needs.setup-release.outputs.version }}
        run: |
          mkdir -p artifacts/deb
          for arch in x64 arm64; do
            PKG_ARCH=$([[ "$arch" == "x64" ]] && echo "amd64" || echo "arm64")
            for package in barbatos barbatos-bridge barbatos-mcp; do
              PKG_DIR="pkg_tmp_${package}_${arch}"
              mkdir -p "$PKG_DIR"
              cp -r packaging/debian/$package/* "$PKG_DIR/"

              mkdir -p "$PKG_DIR/usr/bin"
              case $package in
                barbatos) suffix="tui" ;;
                barbatos-bridge) suffix="bridge" ;;
                barbatos-mcp) suffix="mcp" ;;
              esac
              
              cp "artifacts/barbatos-linux-$arch-$suffix" "$PKG_DIR/usr/bin/$package"
              chmod +x "$PKG_DIR/usr/bin/$package"

              sed -i "s/Version: .*/Version: $VERSION/" "$PKG_DIR/DEBIAN/control"
              sed -i "s/Architecture: .*/Architecture: $PKG_ARCH/" "$PKG_DIR/DEBIAN/control"

              DEB_FILE="artifacts/deb/${package}_${VERSION}_${arch}.deb"
              dpkg-deb --build "$PKG_DIR" "$DEB_FILE"
              rm -rf "$PKG_DIR"
            done
          done

      - name: Publish to APT Repository
        uses: ./.github/actions/publish-to-platform
        with:
          platform: apt
          artifacts-dir: artifacts
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}
          gpg-key-id: ${{ secrets.GPG_KEY_ID }}

  publish-snapcraft:
    name: Publish to Snapcraft Store
    runs-on: ubuntu-latest
    needs: [setup-release, build-linux-x64, build-linux-arm64]
    if: |
      !failure() &&
      startsWith(github.ref, 'refs/tags/v') &&
      ((github.event_name == 'workflow_dispatch' && inputs.publish-snapcraft == true) ||
       (github.event_name == 'push'))
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare dist (x64)
        run: |
          mkdir -p dist
          cp artifacts/barbatos-linux-x64-tui dist/barbatos
          cp artifacts/barbatos-linux-x64-bridge dist/barbatos-bridge
          cp artifacts/barbatos-linux-x64-mcp dist/barbatos-mcp
          chmod +x dist/*

      - name: Build Snap (x64)
        uses: snapcore/action-build@v1
        id: snap-x64
        with:
          path: .
          snapcraft-args: pack --build-for=amd64

      - name: Prepare dist (ARM64)
        run: |
          mkdir -p dist
          cp artifacts/barbatos-linux-arm64-tui dist/barbatos
          cp artifacts/barbatos-linux-arm64-bridge dist/barbatos-bridge
          cp artifacts/barbatos-linux-arm64-mcp dist/barbatos-mcp
          chmod +x dist/*

      - name: Build Snap (ARM64)
        uses: snapcore/action-build@v1
        id: snap-arm64
        with:
          path: .
          snapcraft-args: pack --build-for=arm64

      - name: Upload snaps to artifacts
        shell: bash
        run: |
          mkdir -p artifacts/snap
          cp *.snap artifacts/snap/ || echo "No snaps found in root"

      - name: Publish to Snapcraft Store
        uses: ./.github/actions/publish-to-platform
        with:
          platform: snapcraft
          artifacts-dir: artifacts
          snapcraft-token: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
