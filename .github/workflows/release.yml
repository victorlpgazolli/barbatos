name: Github Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      kotlin:
        options:
          - 'true'
          - 'false'
        description: 'Build Kotlin Binary'
        default: 'false'
      bridge:
        options:
          - 'true'
          - 'false'
        description: 'Build Bridge Binary'
        default: 'false'
      mcp:
        options:
          - 'true'
          - 'false'
        description: 'Build MCP Binary'
        default: 'false'
jobs:
  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Update version.txt
        if: github.event_name != 'workflow_dispatch'
        env:
          COMMIT_MESSAGE: "chore: update version.txt with release ${{ github.ref_name }}"
          VERSION: ${{ github.ref_name }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          echo "${VERSION}" > version.txt
          git add ./version.txt
          git diff --cached --quiet || git commit -m "$COMMIT_MESSAGE"
          git push origin HEAD:master

      - name: Create Release
        if: github.event_name != 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${RELEASE_TAG} \
            --title "Release ${RELEASE_TAG}" \
            --generate-notes
  build-macos:
    name: Build macOS ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: create_release
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        include:
          - os: macos-15
            target: arm64
          # todo: add support for macosX64
          # - os: macos-13
          #   target: x64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: bridge/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: make install_dependencies

      - name: Release
        run: make release

      - name: Package Artifacts
        run: |
          zip -r ./barbatos-macos-${{ matrix.target }}.zip ./dist
          cp dist/barbatos barbatos-macos-${{ matrix.target }}-tui
          cp dist/barbatos-bridge barbatos-macos-${{ matrix.target }}-bridge
          cp dist/barbatos-mcp barbatos-macos-${{ matrix.target }}-mcp

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-${{ matrix.target }}
          path: |
            barbatos-macos-${{ matrix.target }}.zip
            barbatos-macos-${{ matrix.target }}-tui
            barbatos-macos-${{ matrix.target }}-bridge
            barbatos-macos-${{ matrix.target }}-mcp

  build-linux:
    name: Build Linux ${{ matrix.target }}
    runs-on: ubuntu-24.04
    needs: create_release
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        include:
          - arch: x86_64
            target: x64
          - arch: aarch64
            target: arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up native compilation dependencies
        if: matrix.arch == 'x86_64'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Set up cross-compilation dependencies
        if: matrix.arch == 'aarch64'
        run: |
          sudo apt-get update
          chmod +x scripts/setup_linux_arm64_deps.sh
          ./scripts/setup_linux_arm64_deps.sh
          
          # Find libgcc.a path for ARM64 cross-compiler
          LIBGCC_PATH=$(find /usr/lib/gcc-cross/aarch64-linux-gnu -name libgcc.a | head -n 1)
          echo "LIBGCC_PATH=$LIBGCC_PATH" >> $GITHUB_ENV
          echo "Found libgcc.a at: $LIBGCC_PATH"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: bridge/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: make install_dependencies

      - name: Compile JS Agent & Kotlin Binary
        run: |
          make compile_bridge_agent
          make compile_binary ARCH=${{ matrix.arch }}

      - name: Compile Python Bridge (Native x86_64)
        if: matrix.arch == 'x86_64'
        run: make compile_bridge

      - name: Compile MCP Server (Native x86_64)
        if: matrix.arch == 'x86_64'
        run: make compile_mcp

      - name: Compile Python Bridge (Docker ARM64)
        if: matrix.arch == 'aarch64'
        run: |
          make compile_bridge_agent
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/app -w /app \
            python:3.11-slim \
            bash -c "apt-get update && apt-get install -y binutils && pip install -r bridge/requirements.txt && cd bridge && pyinstaller bridge.spec"

      - name: Compile MCP Server (Docker ARM64)
        if: matrix.arch == 'aarch64'
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/app -w /app \
            python:3.11-slim \
            bash -c "apt-get update && apt-get install -y binutils && pip install -r mcp_server/requirements.txt && cd mcp_server && pyinstaller mcp.spec"

      - name: Package Artifacts
        run: |
          make prepare_release ARCH=${{ matrix.arch }}
          zip -r ./barbatos-linux-${{ matrix.target }}.zip ./dist
          cp dist/barbatos barbatos-linux-${{ matrix.target }}-tui
          cp dist/barbatos-bridge barbatos-linux-${{ matrix.target }}-bridge
          cp dist/barbatos-mcp barbatos-linux-${{ matrix.target }}-mcp

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.target }}
          path: |
            barbatos-linux-${{ matrix.target }}.zip
            barbatos-linux-${{ matrix.target }}-tui
            barbatos-linux-${{ matrix.target }}-bridge
            barbatos-linux-${{ matrix.target }}-mcp

  publish-artifacts:
    name: Publish Artifacts to GitHub Release
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name != 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4 # using v4 to get the merge-multiple feature
        with:
          path: artifacts
          merge-multiple: true

      - name: Update Release with artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release upload ${RELEASE_TAG} \
            artifacts/barbatos-*.zip \
            artifacts/barbatos-*-tui \
            artifacts/barbatos-*-bridge \
            artifacts/barbatos-*-mcp \
            --clobber
