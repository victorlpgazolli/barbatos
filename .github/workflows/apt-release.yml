name: APT Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-package:
    name: Build and Package (${{ matrix.target }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - arch: x86_64
            target: amd64
          - arch: aarch64
            target: arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up native compilation dependencies
        if: matrix.arch == 'x86_64'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Set up cross-compilation dependencies
        if: matrix.arch == 'aarch64'
        run: bash scripts/setup_linux_arm64_deps.sh

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: bridge/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: make install_dependencies

      - name: Build Components
        run: |
          make compile_bridge_agent
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            make compile_binary
            make compile_bridge
            make compile_mcp
          else
            make compile_binary ARCH=aarch64
            docker run --rm --platform linux/arm64 \
              -v ${{ github.workspace }}:/app -w /app \
              python:3.11-slim \
              bash -c "apt-get update && apt-get install -y binutils && pip install -r bridge/requirements.txt && cd bridge && pyinstaller bridge.spec"
            docker run --rm --platform linux/arm64 \
              -v ${{ github.workspace }}:/app -w /app \
              python:3.11-slim \
              bash -c "apt-get update && apt-get install -y binutils && pip install -r mcp_server/requirements.txt && cd mcp_server && pyinstaller mcp.spec"
          fi
          make prepare_release ARCH=${{ matrix.arch }}

      - name: Assemble Debian Packages
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="0.0.0-snapshot"
          fi
          mkdir -p dist/deb
          for package in barbatos barbatos-bridge barbatos-mcp; do
            PKG_DIR="pkg_tmp_$package"
            mkdir -p "$PKG_DIR"
            cp -r packaging/debian/$package/* "$PKG_DIR/"

            mkdir -p "$PKG_DIR/usr/bin"
            cp "dist/$package" "$PKG_DIR/usr/bin/$package"
            chmod +x "$PKG_DIR/usr/bin/$package"

            sed -i "s/Version: .*/Version: $VERSION/" "$PKG_DIR/DEBIAN/control"
            sed -i "s/Architecture: .*/Architecture: ${{ matrix.target }}/" "$PKG_DIR/DEBIAN/control"

            DEB_FILE="dist/deb/${package}_${VERSION}_${{ matrix.target }}.deb"
            dpkg-deb --build "$PKG_DIR" "$DEB_FILE"
            rm -rf "$PKG_DIR"
          done

      - name: Generate .changes files
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="0.0.0-snapshot"
          fi

          for deb in dist/deb/*.deb; do
            pkg=$(basename "$deb")
            name="${pkg%%_*}"

            ARCH=$(dpkg-deb -f "$deb" Architecture)
            SIZE=$(stat -c "%s" "$deb")
            MD5=$(md5sum "$deb" | cut -d' ' -f1)
            SHA1=$(sha1sum "$deb" | cut -d' ' -f1)
            SHA256=$(sha256sum "$deb" | cut -d' ' -f1)
            DATE=$(date -R)

            sed \
              -e "s/{{DATE}}/$DATE/" \
              -e "s/{{PACKAGE}}/$name/g" \
              -e "s/{{ARCH}}/$ARCH/" \
              -e "s/{{VERSION}}/$VERSION/" \
              -e "s/{{FILE_SIZE}}/$SIZE/" \
              -e "s/{{MD5}}/$MD5/" \
              -e "s/{{SHA1}}/$SHA1/" \
              -e "s/{{SHA256}}/$SHA256/" \
              -e "s/{{FILENAME}}/$pkg/" \
              packaging/debian/changes.template \
              > dist/deb/${pkg%.deb}.changes
          done

      - name: Install signing tools
        run: sudo apt-get update && sudo apt-get install -y devscripts

      - name: Import GPG key
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Import GPG Key and Preset Passphrase
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          KEYGRIP=$(gpg --with-keygrip --list-secret-keys | grep Keygrip | awk '{print $3}')

          echo "allow-preset-passphrase" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent

          echo "$GPG_PASSPHRASE" | gpg-preset-passphrase --preset $KEYGRIP

      - name: Sign Debian Packages (debsign)
        env:
          PGP_PROGRAM: gpg --batch --pinentry-mode=loopback
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          for changes in dist/deb/*.changes; do
            debsign -p"$PGP_PROGRAM" -k"$GPG_KEY_ID" "$changes"
          done

      - name: Upload Debian Packages
        uses: actions/upload-artifact@v7
        with:
          name: deb-packages-${{ matrix.target }}
          path: dist/deb/*.deb

  publish-repo:
    needs: build-and-package
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: deb-packages
          pattern: deb-packages-*
          merge-multiple: true

      - name: Upload .deb packages to GitHub Release
        run: |
          for i in $(seq 1 20); do
            if gh release upload ${{ github.ref_name }} deb-packages/*.deb --clobber 2>/dev/null; then
              echo "Upload succeeded."
              break
            fi
            echo "Release not ready yet, retrying in 30s... ($i/20)"
            sleep 30
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Import GPG key
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Update APT Repository
        env:
          PACKAGES_BASE_URL: "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}"
        run: |
          sudo apt-get update && sudo apt-get install -y apt-utils
          mkdir -p apt_meta
          bash scripts/update-apt-repo.sh \
            deb-packages \
            apt_meta \
            ${{ secrets.GPG_KEY_ID }} \
            "${{ secrets.GPG_PASSPHRASE }}" \
            "$PACKAGES_BASE_URL"

      - name: Deploy to web/
        env:
          COMMIT_MESSAGE: "chore: update apt repository for release ${{ github.ref_name }}"
        run: |
          cp -r ./dists ./web
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ./web
          git diff --cached --quiet || git commit -m "$COMMIT_MESSAGE"
          git push origin HEAD:master
