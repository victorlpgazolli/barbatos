name: APT Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-package:
    name: Build and Package (${{ matrix.target }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - arch: x86_64
            target: amd64
          - arch: aarch64
            target: arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up native compilation dependencies
        if: matrix.arch == 'x86_64'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Set up cross-compilation dependencies
        if: matrix.arch == 'aarch64'
        run: bash scripts/setup_linux_arm64_deps.sh

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: bridge/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: make install_dependencies

      - name: Build Components
        run: |
          make compile_bridge_agent
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            make compile_binary
            make compile_bridge
            make compile_mcp
          else
            make compile_binary ARCH=aarch64
            # ARM64 Docker builds for PyInstaller
            docker run --rm --platform linux/arm64 \
              -v ${{ github.workspace }}:/app -w /app \
              python:3.11-slim \
              bash -c "apt-get update && apt-get install -y binutils && pip install -r bridge/requirements.txt && cd bridge && pyinstaller bridge.spec"
            docker run --rm --platform linux/arm64 \
              -v ${{ github.workspace }}:/app -w /app \
              python:3.11-slim \
              bash -c "apt-get update && apt-get install -y binutils && pip install -r mcp_server/requirements.txt && cd mcp_server && pyinstaller mcp.spec"
          fi
          make prepare_release ARCH=${{ matrix.arch }}

      - name: Assemble Debian Packages
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="0.0.0-snapshot"
          fi
          
          mkdir -p dist/deb
          
          for package in barbatos barbatos-bridge barbatos-mcp; do
            # Create a temporary directory for packaging to avoid polluting the repo
            PKG_DIR="pkg_tmp_$package"
            mkdir -p "$PKG_DIR"
            cp -r packaging/debian/$package/* "$PKG_DIR/"
            
            # Ensure bin directory exists and copy binary
            mkdir -p "$PKG_DIR/usr/bin"
            cp "dist/$package" "$PKG_DIR/usr/bin/$package"
            chmod +x "$PKG_DIR/usr/bin/$package"
            
            # Update control file
            sed -i "s/Version: .*/Version: $VERSION/" "$PKG_DIR/DEBIAN/control"
            sed -i "s/Architecture: .*/Architecture: ${{ matrix.target }}/" "$PKG_DIR/DEBIAN/control"
            
            # Build the package
            DEB_FILE="dist/deb/${package}_${VERSION}_${{ matrix.target }}.deb"
            dpkg-deb --build "$PKG_DIR" "$DEB_FILE"
            rm -rf "$PKG_DIR"
          done

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Sign Debian Packages
        run: |
          sudo apt-get update && sudo apt-get install -y dpkg-sig
          for deb in dist/deb/*.deb; do
            dpkg-sig --gpg-options "--passphrase ${{ secrets.GPG_PASSPHRASE }} --batch --no-tty --pinentry-mode loopback" \
                     -k ${{ secrets.GPG_KEY_ID }} \
                     --sign builder "$deb"
          done

      - name: Upload Debian Packages
        uses: actions/upload-artifact@v7
        with:
          name: deb-packages-${{ matrix.target }}
          path: dist/deb/*.deb

  publish-repo:
    needs: build-and-package
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          path: main

      - name: Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: repo

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: deb-packages
          pattern: deb-packages-*
          merge-multiple: true

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Update APT Repository
        run: |
          sudo apt-get update && sudo apt-get install -y apt-utils
          bash main/scripts/update-apt-repo.sh deb-packages repo ${{ secrets.GPG_KEY_ID }} "${{ secrets.GPG_PASSPHRASE }}"

      - name: Deploy to GitHub Pages
        run: |
          cd repo
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: update apt repository for release ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin gh-pages
