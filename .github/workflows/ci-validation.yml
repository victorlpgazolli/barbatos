name: PR Validation

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev

      - name: Run Kotlin Unit Tests
        run: ./gradlew allTests --no-daemon
        
      - name: Install Bridge Dependencies
        run: |
          cd bridge
          pip install -r requirements.txt
          
      - name: Run Bridge Unit Tests
        run: |
          cd bridge
          python3 -m pytest test_bridge.py

  build:
    name: Compilation Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev

      - name: Compile Linux x64 Native Binary
        run: ./gradlew linkDebugExecutableLinuxX64 --no-daemon
        
      - name: Validate Bridge and MCP
        run: |
          cd bridge
          python3 -m py_compile bridge.py
          cd ../mcp_server
          python3 -m py_compile server.py
