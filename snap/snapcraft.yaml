name: barbatos
base: core24
version: '1.0.0'
summary: Frictionless Android Runtime Debugger & MCP Server
description: |
  Barbatos is a zero-setup Android runtime debugger designed to bring the power of 
  Frida to developers and AI agents without the complexity of manual setup. 
  It grants the ability to deeply understand an app's behavior, reveal hidden 
  states in the heap, and modify execution flow in real-time.

  Main Features:
  - Class Discovery: Real-time enumeration of loaded Java/Kotlin classes.
  - Deep Inspection: Recursive traversal of object hierarchies (Fields, Maps, 
    Collections).
  - Method Hooking: Intercept execution flow, inspect arguments, and capture 
    return values.
  - Live Field Editing: Modify primitive field values (String, Int, Boolean) 
    instantly.
  - AI-Driven Debugging: Built-in MCP (Model Context Protocol) Server to let 
    LLMs (Claude/Cursor) debug your app autonomously.

  This snap includes:
  - 'barbatos': The interactive TUI shell.
  - 'barbatos.bridge': The Frida RPC bridge (required for TUI and MCP).
  - 'barbatos.mcp': The MCP server for connecting AI agents.

  Note: After installation, run 'sudo snap connect barbatos:adb-support' 
  to allow the debugger to communicate with your Android devices.

grade: stable
confinement: strict

# Define architectures to build for
architectures:
  - build-on: [amd64, arm64]

apps:
  barbatos:
    command: bin/barbatos
    plugs:
      - network
      - network-bind
      - adb-support
      - home
  bridge:
    command: bin/barbatos-bridge
    plugs:
      - network
      - network-bind
      - adb-support
  mcp:
    command: bin/barbatos-mcp
    plugs:
      - network

parts:
  # The entire project is built via the unified script
  barbatos-components:
    plugin: nil
    source: .
    build-packages:
      - openjdk-21-jdk-headless
      - libcurl4-openssl-dev
      - nodejs
      - npm
      - binutils
      - python3-pip
      - python3-venv
    override-build: |
      # Snapcraft runs parts independently in isolated environments.
      # By calling our script, we build everything (TUI, Bridge, MCP) in one go
      # and place it in the common dist/ folder.
      
      ARCH=$(uname -m)
      if [ "$ARCH" = "x86_64" ]; then
        ./scripts/build_linux_x64.sh
      elif [ "$ARCH" = "aarch64" ]; then
        ./scripts/build_linux_arm64.sh
      else
        echo "Unsupported architecture: $ARCH"
        exit 1
      fi
      
      # Install binaries into snap payload
      mkdir -p $CRAFT_PART_INSTALL/bin
      cp dist/barbatos $CRAFT_PART_INSTALL/bin/barbatos
      cp dist/barbatos-bridge $CRAFT_PART_INSTALL/bin/barbatos-bridge
      cp dist/barbatos-mcp $CRAFT_PART_INSTALL/bin/barbatos-mcp
